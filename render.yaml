services:
  - type: web
    name: bnb-backend
    env: docker
    plan: starter
    dockerfilePath: Dockerfile
    healthCheckPath: /health
    instanceCount: 1

cronJobs:
  - name: keep-alive
    schedule: "*/5 * * * *"
    command: 'curl -fsS https://b-and-b-backend.onrender.com/health'
    timezone: Etc/UTC
