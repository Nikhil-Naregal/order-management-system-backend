spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/bnb
    username: postgres
    password: admin
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
  profiles:
    active: dev 

server:
  port: ${SERVER_PORT:8080}
